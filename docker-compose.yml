version: "3.9"

services:
  front-end:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: stockmanager_frontend
    ports:
      - "80:80"
    depends_on:
      - back-end
    networks:
      - stockmanager_network

  back-end:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: stockmanager_backend
    ports:
      - "8080:8080"
    networks:
      - stockmanager_network

networks:
  stockmanager_network:
    driver: bridge
    